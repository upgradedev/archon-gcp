name: CodeQL

# Static Application Security Testing (SAST) for Archon (GCP).
# Scans the Python sources (archon/) with GitHub's CodeQL engine using the
# security-and-quality query suite.
#
# build-mode: none — Python is interpreted, so CodeQL extracts directly from
# source; no install/build step is required.

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    # Mondays 04:17 UTC — off-peak, avoids the top-of-hour scheduling stampede.
    - cron: "17 4 * * 1"

# CodeQL needs security-events:write to upload its SARIF results to the
# repository's Security > Code scanning tab.
permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language:
          - python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
