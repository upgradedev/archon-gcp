name: GCP Capstone Evidence CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    name: Test, rebuild notebook, and run demo
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Offline tests
        run: python -m pytest -q

      - name: Rebuild notebook
        run: python build_notebook.py

      - name: Deterministic demo
        run: python -m archon.cli
